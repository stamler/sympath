name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./...

  installer-smoke-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run POSIX installer smoke tests
        env:
          RUN_INSTALLER_SMOKE_TESTS: "1"
        run: go test ./... -run 'TestInstallScript|TestPackageReleaseScript'

  go-test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        shell: pwsh
        run: go test ./...

  installer-smoke-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run PowerShell installer smoke tests
        shell: pwsh
        env:
          RUN_INSTALLER_SMOKE_TESTS: "1"
        run: go test ./... -run TestInstallPowerShell
